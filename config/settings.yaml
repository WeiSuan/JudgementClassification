input:
  file_path: data/input/SCC_設備業退緩議_僅公司_2301至2606.xlsx
  date_field: receive_date
  customer_field: customer_name
  date_format: "%Y-%m-%d"

crawler:
  base_url: https://judgment.judicial.gov.tw/FJUD/default.aspx
  headless: true
  timeout_ms: 30000
  detail_timeout_ms: 10000
  max_retries: 3
  request_interval_seconds: 1

preprocess:
  normalize_whitespace: true
  strip_symbols: false
  deduplicate_by:
    - customer_name

output:
  format: json
  path: data/output/judgment_results_mvp.json
  encoding: utf-8

batch:
  output_path: data/output/judgment_results_batch.json
  request_interval_seconds: 1
  max_retries: 3
  resume: true

mvp:
  test_customer_name: 麗展能源有限公司
